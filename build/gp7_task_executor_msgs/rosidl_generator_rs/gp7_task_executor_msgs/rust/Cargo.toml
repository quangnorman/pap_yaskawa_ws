[package]
name = "gp7_task_executor_msgs"
version = "1.0.0"
edition = "2021"

[dependencies]
rosidl_runtime_rs = "0.6"
serde = { version = "1", optional = true, features = ["derive"] }
serde-big-array = { version = "0.5.1", optional = true }

# ROS Dependencies
std_msgs = "*"
geometry_msgs = "*"

[features]
serde = ['dep:serde', 'dep:serde-big-array', 'rosidl_runtime_rs/serde', 'std_msgs/serde', 'geometry_msgs/serde']

[package.metadata.rclrs]
reexport = true
