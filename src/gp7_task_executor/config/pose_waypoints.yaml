# Pose waypoints for gp7_task_executor
# All values are in world frame.
# Orientation is specified as RPY (roll, pitch, yaw) in radians.
# RPY is converted to quaternion internally at load time.
#
# To add or modify waypoints:
#   1. Edit the values below.
#   2. Rebuild the package: colcon build --packages-select gp7_task_executor
#   3. Restart the node.
#
pose_waypoints:
  pose_A:
    description: "Pose waypoint A"
    frame_id: "world"
    position: [0.5241, 0.0, 0.6522]
    rpy: [3.1416, 0.0, 0.0]

  pose_B:
    description: "Pose waypoint B"
    frame_id: "world"
    position: [0.00254, -0.4966, 0.4939]
    rpy: [3.1416, 0.0, 0.0]

  pose_C:
    description: "Pose waypoint C"
    frame_id: "world"
    position: [0.00224, -0.4946, 0.3827]
    rpy: [3.1416, 0.0, 0.0]
