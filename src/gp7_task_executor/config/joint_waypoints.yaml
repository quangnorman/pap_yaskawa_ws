# Joint waypoints for gp7_task_executor
# All values are in DEGREES (converted to radians internally at load time).
# Joint order for each waypoint: joint_s, joint_l, joint_u, joint_r, joint_b, joint_t
#
# To add or modify waypoints:
#   1. Edit the values below in degrees.
#   2. Rebuild the package: colcon build --packages-select gp7_task_executor
#   3. Restart the node.
#
waypoints:
  origin:
    description: "Robot at zero position (all joints at 0 deg)"
    joints: [0.0, 0.0, 0.0, 0.0, -90.0, 0.0]

  P1:
    description: "Pick position 1"
    joints: [0.0, 6.05, -26.3, 0.0, -57.65, 0.0]

  P2:
    description: "Pick position 2"
    joints: [-24.01, -2.95, -35.58, 0.0, -57.37, 24.01]

  P3:
    description: "Pick position 3"
    joints: [-90, -2, -23,-1, -68, -17]

  P4:
    description: "Pick position 4"
    joints: [-90, 4, -32,-1, -54, -17]
